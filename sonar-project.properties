sonar.projectKey=hsmith100_connect-atlanta
sonar.organization=hsmith100
sonar.sources=.

# Sources — production code only (tests excluded via sonar.exclusions)
sonar.sources=frontend/components,frontend/pages,frontend/lib,lambda/src,shared

# Mark test files so Sonar counts them separately
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclude generated output, deps, and test files from source analysis
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/dist/**,**/cdk.out/**,frontend/out/**,frontend/.next/**,**/coverage/**

# LCOV coverage reports generated by Jest
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,lambda/coverage/lcov.info

sonar.sourceEncoding=UTF-8
