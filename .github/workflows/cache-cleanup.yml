name: Cache Cleanup

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:

jobs:
  cleanup:
    name: Delete all caches
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete all GitHub Actions caches
        run: gh cache delete --all || echo "No caches to delete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Delete all artifacts
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --paginate \
            --jq '.artifacts[] | select(.expired == false) | .id' | \
          xargs -I{} gh api --method DELETE repos/${{ github.repository }}/actions/artifacts/{} || echo "No artifacts to delete"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
