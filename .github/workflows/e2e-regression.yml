name: E2E Regression Tests

on:
  workflow_call:
    inputs:
      base_url:
        required: true
        type: string
      admin_key_secret_arn:
        required: true
        type: string

jobs:
  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: e2e

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch admin key
        run: |
          KEY=$(aws secretsmanager get-secret-value \
            --secret-id ${{ inputs.admin_key_secret_arn }} \
            --query SecretString \
            --output text)
          echo "::add-mask::$KEY"
          echo "ADMIN_KEY=$KEY" >> $GITHUB_ENV

      - name: Run regression and admin tests
        run: npx playwright test regression.spec.ts admin.spec.ts
        working-directory: e2e
        env:
          BASE_URL: ${{ inputs.base_url }}
          ADMIN_KEY: ${{ env.ADMIN_KEY }}
