name: Cleanup PR Environment

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    name: Destroy PR AWS environment
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install dependencies
        run: |
          npm ci --prefix infrastructure
          npm ci --prefix lambda

      - name: Destroy PR stacks
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          npx cdk destroy \
            ConnectPR${PR_NUMBER}FrontendStack \
            ConnectPR${PR_NUMBER}BackendStack \
            ConnectPR${PR_NUMBER}DynamoStack \
            --context pr=${PR_NUMBER} --force
        working-directory: infrastructure
