name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (branch, tag, or commit SHA). Defaults to main.'
        required: false
        default: main
        type: string

jobs:
  # ── Stage 1: Quality checks ──────────────────────────────────────────────────

  quality-checks:
    name: Quality Checks
    uses: ./.github/workflows/quality-checks.yml

  # ── Stage 2: Synth & build (parallel, after checks pass) ────────────────────

  synth:
    name: CDK synth
    needs: [quality-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json
      - run: npm ci --prefix infrastructure
      - run: npm ci --prefix lambda
      - run: npx cdk synth --app 'npx ts-node bin/app.ts' --all
        working-directory: infrastructure

  build-frontend:
    name: Build — frontend
    needs: [quality-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  # ── Stage 3: Deploy to staging ───────────────────────────────────────────────

  deploy-staging:
    name: Deploy — staging
    needs: [synth, build-frontend]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install infrastructure dependencies
        run: npm ci --prefix infrastructure

      - name: Install lambda dependencies
        run: npm ci --prefix lambda

      - name: CDK deploy staging
        run: npx cdk deploy ConnectStagingDynamoStack ConnectStagingBackendStack ConnectStagingFrontendStack --require-approval never
        working-directory: infrastructure

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/

      - name: Sync frontend to staging S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ConnectStagingFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          aws s3 sync frontend/out/ s3://$BUCKET --delete

      - name: Invalidate staging CloudFront
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ConnectStagingFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"

  # ── Stage 4: Regression tests against staging ───────────────────────────────
  # Production deploy is blocked if this job fails.

  regression-tests:
    name: Regression Tests — staging
    needs: [deploy-staging]
    uses: ./.github/workflows/e2e-regression.yml
    with:
      base_url: https://d36pa7dr4nksf5.cloudfront.net

  # ── Stage 5: Deploy to production ───────────────────────────────────────────

  deploy-production:
    name: Deploy — production
    needs: [regression-tests]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install infrastructure dependencies
        run: npm ci --prefix infrastructure

      - name: Install lambda dependencies
        run: npm ci --prefix lambda

      - name: CDK deploy production
        run: npx cdk deploy ConnectDynamoStack ConnectBackendStack ConnectFrontendStack --require-approval never
        working-directory: infrastructure

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/

      - name: Sync frontend to production S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ConnectFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          aws s3 sync frontend/out/ s3://$BUCKET --delete

      - name: Invalidate production CloudFront
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ConnectFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"

  # ── Stage 6: Post-deploy smoke tests against production ─────────────────────

  post-deploy-smoke:
    name: Post-Deploy Smoke Tests
    needs: [deploy-production]
    uses: ./.github/workflows/e2e-smoke.yml
    with:
      base_url: https://connectevents.co

  # ── Stage 7: Auto-rollback if smoke fails ────────────────────────────────────
  # Only runs when prod deployed successfully but smoke caught a regression.
  # Finds the last known-good SHA via the GitHub API and re-deploys it.

  rollback-production:
    name: Auto-Rollback Production
    needs: [deploy-production, post-deploy-smoke]
    if: needs.post-deploy-smoke.result == 'failure' && needs.deploy-production.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Find last known-good production SHA
        id: prev
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'production.yml',
              status: 'success',
              per_page: 5,
            });
            const prev = runs.data.workflow_runs.find(r => r.id !== context.runId);
            if (!prev) core.setFailed('No previous successful production run found — manual rollback required.');
            core.setOutput('sha', prev.head_sha);
            console.log(`Rolling back to ${prev.head_sha} from run #${prev.run_number}`);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.prev.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend at previous SHA
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install infrastructure and lambda dependencies
        run: |
          npm ci --prefix infrastructure
          npm ci --prefix lambda

      - name: CDK deploy production at previous SHA
        run: npx cdk deploy ConnectDynamoStack ConnectBackendStack ConnectFrontendStack --require-approval never
        working-directory: infrastructure

      - name: Sync previous frontend build to production S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ConnectFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          aws s3 sync frontend/out/ s3://$BUCKET --delete

      - name: Invalidate production CloudFront
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ConnectFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"
