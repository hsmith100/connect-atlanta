name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Quality checks ──────────────────────────────────────────────────

  quality-checks:
    name: Quality Checks
    uses: ./.github/workflows/quality-checks.yml

  # ── Stage 2: Synth & build (parallel, after checks pass) ────────────────────

  synth:
    name: CDK synth
    needs: [quality-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json
      - run: npm ci --prefix infrastructure
      - run: npm ci --prefix lambda
      - run: npx cdk synth --app 'npx ts-node bin/app.ts' --all
        working-directory: infrastructure

  build-frontend:
    name: Build — frontend
    needs: [quality-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  # ── Stage 3: Deploy to dev ───────────────────────────────────────────────────

  deploy-dev:
    name: Deploy — dev
    needs: [synth, build-frontend]
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install infrastructure dependencies
        run: npm ci --prefix infrastructure

      - name: Install lambda dependencies
        run: npm ci --prefix lambda

      - name: CDK deploy dev
        run: npx cdk deploy ConnectDevDynamoStack ConnectDevBackendStack ConnectDevFrontendStack --require-approval never
        working-directory: infrastructure

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/

      - name: Sync frontend to dev S3
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ConnectDevFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          aws s3 sync frontend/out/ s3://$BUCKET --delete

      - name: Invalidate dev CloudFront
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ConnectDevFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"

      - name: Get dev CloudFront URL
        id: dev-url
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ConnectDevFrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontUrl`].OutputValue' \
            --output text)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment dev URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- dev-deploy-comment -->';
            const body = `${marker}\n✅ Dev deployed: ${{ steps.dev-url.outputs.url }}`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  # ── Stage 4: Automation tests against dev ───────────────────────────────────

  automation-tests:
    name: Automation Tests
    needs: deploy-dev
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/e2e-regression.yml
    with:
      base_url: https://d2gqwwd1lyhnar.cloudfront.net
