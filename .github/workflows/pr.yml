name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Lint
        run: npm run lint --prefix frontend

      - name: Build (static export)
        run: npm run build --prefix frontend

  lambda:
    name: Lambda — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: lambda/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix lambda

      - name: Typecheck
        run: npm run typecheck --prefix lambda

  infrastructure:
    name: Infrastructure — typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix infrastructure

      - name: Typecheck
        run: npm run build --prefix infrastructure
