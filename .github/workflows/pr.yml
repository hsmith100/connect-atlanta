name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Quality checks ──────────────────────────────────────────────────

  quality-checks:
    name: Quality Checks
    uses: ./.github/workflows/quality-checks.yml

  # ── Stage 2: Synth & build (parallel, after checks pass) ────────────────────

  synth:
    name: CDK synth
    needs: [quality-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json
      - run: npm ci --prefix infrastructure
      - run: npm ci --prefix lambda
      - run: npx cdk synth --app 'npx ts-node bin/app.ts' --all
        working-directory: infrastructure

  build-frontend:
    name: Build — frontend
    needs: [quality-checks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/
          retention-days: 1

  # ── Stage 3: Deploy PR environment ──────────────────────────────────────────

  deploy-pr-env:
    name: Deploy — PR environment
    needs: [synth, build-frontend]
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    outputs:
      pr_url: ${{ steps.pr-url.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Install infrastructure dependencies
        run: npm ci --prefix infrastructure

      - name: Install lambda dependencies
        run: npm ci --prefix lambda

      - name: CDK deploy PR env
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npx cdk deploy ConnectPR${PR_NUMBER}DynamoStack ConnectPR${PR_NUMBER}BackendStack ConnectPR${PR_NUMBER}FrontendStack --context pr=${PR_NUMBER} --require-approval never
        working-directory: infrastructure

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-out
          path: frontend/out/

      - name: Sync frontend to PR S3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ConnectPR${PR_NUMBER}FrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`FrontendBucketName`].OutputValue' \
            --output text)
          aws s3 sync frontend/out/ s3://$BUCKET --delete

      - name: Invalidate PR CloudFront
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name ConnectPR${PR_NUMBER}FrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
            --output text)
          aws cloudfront create-invalidation --distribution-id $DIST_ID --paths "/*"

      - name: Seed PR environment data
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          aws dynamodb put-item \
            --table-name connect-pr-${PR_NUMBER}-hero-cards \
            --item '{
              "id":        {"S": "'$(uuidgen)'"},
              "entity":    {"S": "CARD"},
              "sortOrder": {"N": "1"},
              "title":     {"S": "Beats on the Beltline"},
              "subtitle":  {"S": "PR Environment"},
              "visible":   {"BOOL": true},
              "createdAt": {"S": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}
            }'
          aws dynamodb put-item \
            --table-name connect-pr-${PR_NUMBER}-photos \
            --item '{
              "id":        {"S": "'$(uuidgen)'"},
              "entity":    {"S": "PHOTO"},
              "sortOrder": {"N": "1"},
              "url":       {"S": "https://placehold.co/800x800/png"},
              "visible":   {"BOOL": true},
              "createdAt": {"S": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}
            }'

      - name: Get PR CloudFront URL
        id: pr-url
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ConnectPR${PR_NUMBER}FrontendStack \
            --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontUrl`].OutputValue' \
            --output text)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- dev-deploy-comment -->';
            const body = `${marker}\n✅ PR environment deployed: ${{ steps.pr-url.outputs.url }}`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

  # ── Stage 4: Automation tests against PR environment ────────────────────────

  automation-tests:
    name: Automation Tests
    needs: deploy-pr-env
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/e2e-regression.yml
    with:
      base_url: ${{ needs.deploy-pr-env.outputs.pr_url }}
