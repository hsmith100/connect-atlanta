# Custom Build Docker Compose Configuration
# Generated by Build-A-Server Burger
# 
# To start your stack:
#   docker-compose up -d
# 
# To stop your stack:
#   docker-compose down
# 
# To view logs:
#   docker-compose logs -f

networks:
  burger_network:
    driver: bridge
services:
  backend:
    command:
    - sh
    - -c
    - apt-get update && apt-get install -y curl libpq-dev && pip install -r requirements.txt
      && python main.py
    container_name: custom-burger-app-backend-fastapi
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 192M
    environment:
      API_PORT: '8000'
      CONTAINER_DEPLOYMENT: 'True'
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000
      DATABASE_URL: postgresql://burger_user:burger_secure_password_123@database:5432/burger_app
      DEBUG: 'True'
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: '8000'
      SECRET_KEY: burger_custom_secret_key_super_secure_123
      WORKERS: '2'
    expose:
    - '8000'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test:
      - CMD
      - curl
      - -f
      - http://127.0.0.1:8000/health
      timeout: 10s
    hostname: fastapi-backend
    image: python:3.11-slim
    labels:
    - traefik.enable=true
    - traefik.http.routers.backend.rule=Host(`api.${DOMAIN:-localhost}`)
    - traefik.http.services.backend.loadbalancer.server.port=8000
    - com.buildaburger.service=backend
    - com.buildaburger.backend.type=fastapi
    - com.buildaburger.backend.version=0.104.x
    - com.buildaburger.performance.optimized=true
    networks:
    - burger_network
    ports:
    - 8000:8000
    restart: unless-stopped
    volumes:
    - ./backend:/app
    working_dir: /app
  database:
    container_name: custom-burger-app-database-postgresql
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m
    environment:
      POSTGRES_DB: burger_app
      POSTGRES_PASSWORD: burger_secure_password_123
      POSTGRES_USER: burger_user
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD-SHELL
      - pg_isready -U burger_user -d burger_app
      timeout: 10s
    hostname: postgres-db
    image: postgres:15-alpine
    labels:
    - traefik.enable=false
    - com.buildaburger.service=database
    - com.buildaburger.database.type=postgresql
    - com.buildaburger.database.version=15.5
    - com.buildaburger.performance.optimized=true
    networks:
    - burger_network
    ports:
    - ${POSTGRES_PORT:-5433}:5432
    restart: unless-stopped
    volumes:
    - postgresql_data:/var/lib/postgresql/data
  frontend:
    command:
    - sh
    - -c
    - apk add --no-cache curl && npm install && npm run dev -- --hostname 0.0.0.0
    container_name: custom-burger-app-frontend-nextjs
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 768m
    environment:
      APP_NAME: Custom Burger App
      ENVIRONMENT: production
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: Custom App
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NODE_ENV: development
      PORT: '3000'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 90s
      test:
      - CMD
      - sh
      - -c
      - command -v wget > /dev/null && wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health
        || exit 1
      timeout: 10s
    hostname: nextjs-frontend
    image: node:18-alpine
    networks:
    - burger_network
    ports:
    - 3000:3000
    restart: unless-stopped
    volumes:
    - ./frontend:/app
    working_dir: /app
version: '3.8'
volumes:
  postgresql_data: {}
