# Production Configuration - Generated by Build-A-Server Burger
networks:
  burger_network:
    driver: bridge
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: connect-backend-fastapi
    depends_on:
      database:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 192M
    env_file:
      - ./backend/.env
    environment:
      API_PORT: '8000'
      CONTAINER_DEPLOYMENT: 'True'
      CORS_ORIGINS: http://localhost:3000,http://frontend:3000,http://98.81.74.242:3000
      DATABASE_URL: postgresql://burger_user:burger_secure_password_123@database:5432/burger_app
      DEBUG: 'True'
      DJANGO_ENV: production
      ENVIRONMENT: production
      FASTAPI_ENV: production
      HOST: 0.0.0.0
      PORT: '8000'
      SECRET_KEY: burger_custom_secret_key_super_secure_123
      WORKERS: '2'
      # Cloudinary Configuration
      CLOUDINARY_CLOUD_NAME: beats-on-beltline
      CLOUDINARY_API_KEY: '132531398566916'
      CLOUDINARY_API_SECRET: 7NLfDFSPbupwHOcoviFHMM5FOZM
      CLOUDINARY_SECURE: 'true'
      CLOUDINARY_PHOTO_PRESET: event-photos
      CLOUDINARY_VIDEO_PRESET: event-videos
    expose:
    - '8000'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000
      timeout: 10s
    hostname: fastapi-backend
    labels:
    - traefik.enable=true
    - traefik.http.routers.backend.rule=Host(`api.${DOMAIN:-localhost}`)
    - traefik.http.services.backend.loadbalancer.server.port=8000
    - com.buildaburger.service=backend
    - com.buildaburger.backend.type=fastapi
    - com.buildaburger.backend.version=0.104.x
    - com.buildaburger.performance.optimized=true
    networks:
    - burger_network
    ports:
    - 8000:8000
    restart: unless-stopped
  database:
    container_name: connect-database-postgresql
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m
    environment:
      POSTGRES_DB: burger_app
      POSTGRES_PASSWORD: burger_secure_password_123
      POSTGRES_USER: burger_user
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 30s
      test:
      - CMD-SHELL
      - pg_isready -U burger_user -d burger_app
      timeout: 10s
    hostname: postgres-db
    image: postgres:15-alpine
    labels:
    - traefik.enable=false
    - com.buildaburger.service=database
    - com.buildaburger.database.type=postgresql
    - com.buildaburger.database.version=15.5
    - com.buildaburger.performance.optimized=true
    networks:
    - burger_network
    ports:
    - ${POSTGRES_PORT:-5432}:5432
    restart: unless-stopped
    volumes:
    - postgresql_data:/var/lib/postgresql/data
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_GA_ID: G-86ZLZS2JEX
    container_name: connect-frontend-nextjs
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.8'
          memory: 1024m
    env_file:
      - ./frontend/.env
    environment:
      APP_NAME: Custom Burger App
      ENVIRONMENT: production
      HOSTNAME: 0.0.0.0
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://98.81.74.242:8000
      NEXT_PUBLIC_APP_NAME: Custom App
      NEXT_PUBLIC_SITE_URL: http://98.81.74.242:3000
      NODE_ENV: production
      PORT: '3000'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3000
      timeout: 10s
    hostname: nextjs-frontend
    networks:
    - burger_network
    ports:
    - 3000:3000
    restart: unless-stopped
version: '3.8'
volumes:
  postgresql_data: {}
